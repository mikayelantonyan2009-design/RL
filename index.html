<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Rocket Car Arena with Jumping</title>
<style>
body { margin:0; overflow:hidden; background:#0b0f1a; }
#ui {
 position:absolute; top:10px; left:50%; transform:translateX(-50%);
 color:white; font-family:Arial; font-size:20px;
}
</style>
</head>
<body>
<div id="ui">Score: 0 - 0</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lighting
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

// Field
const fieldGeo = new THREE.PlaneGeometry(200, 120);
const fieldMat = new THREE.MeshStandardMaterial({color:0x1e7f3f});
const field = new THREE.Mesh(fieldGeo, fieldMat);
field.rotation.x = -Math.PI/2;
scene.add(field);

// Walls
const wallMat = new THREE.MeshStandardMaterial({color:0x444444});
const wallLeft = new THREE.Mesh(new THREE.BoxGeometry(2,10,120), wallMat);
wallLeft.position.set(-101,5,0);
scene.add(wallLeft);
const wallRight = wallLeft.clone();
wallRight.position.set(101,5,0);
scene.add(wallRight);
const wallTop = new THREE.Mesh(new THREE.BoxGeometry(200,10,2), wallMat);
wallTop.position.set(0,5,-61);
scene.add(wallTop);
const wallBottom = wallTop.clone();
wallBottom.position.set(0,5,61);
scene.add(wallBottom);

// Goals with crossbar
function createGoal(x) {
 const group = new THREE.Group();
 const postMat = new THREE.MeshStandardMaterial({color:0xffffff});
 const post1 = new THREE.Mesh(new THREE.BoxGeometry(1,10,1), postMat);
 const post2 = post1.clone();
 const crossbar = new THREE.Mesh(new THREE.BoxGeometry(1,1,10), postMat);
 post1.position.set(x,5,-5);
 post2.position.set(x,5,5);
 crossbar.position.set(x,10,0);
 group.add(post1, post2, crossbar);
 return group;
}
const goalLeft = createGoal(-95);
const goalRight = createGoal(95);
scene.add(goalLeft);
scene.add(goalRight);

// Ball
const ballGeo = new THREE.SphereGeometry(2,16,16);
const ballMat = new THREE.MeshStandardMaterial({color:0xffffff});
const ball = new THREE.Mesh(ballGeo, ballMat);
scene.add(ball);
let ballVel = new THREE.Vector3();

// Cars
const carGeo = new THREE.BoxGeometry(4,2,6);
const playerMat = new THREE.MeshStandardMaterial({color:0x00ffff});
const aiMat = new THREE.MeshStandardMaterial({color:0xff5555});

const player = new THREE.Mesh(carGeo, playerMat);
scene.add(player);
let playerVel = new THREE.Vector3();
let playerAngle = 0;
let playerYVel = 0;

const ai = new THREE.Mesh(carGeo, aiMat);
scene.add(ai);
let aiVel = new THREE.Vector3();
let aiAngle = 0;
let aiYVel = 0;

// Controls
const keys = {};
document.addEventListener('keydown', e=>keys[e.key]=true);
document.addEventListener('keyup', e=>keys[e.key]=false);

let score = [0,0];

function reset() {
 ball.position.set(0,2,0);
 ballVel.set(0,0,0);

 player.position.set(-20,1,0);
 playerAngle = 0;
 playerVel.set(0,0,0);
 playerYVel = 0;

 ai.position.set(20,1,0);
 aiAngle = Math.PI;
 aiVel.set(0,0,0);
 aiYVel = 0;
}
reset();

function updatePlayer() {
 // Forward/back
 if(keys['ArrowUp']) {
  playerVel.x += Math.sin(playerAngle)*0.1;
  playerVel.z += Math.cos(playerAngle)*0.1;
 }
 if(keys['ArrowDown']) {
  playerVel.x -= Math.sin(playerAngle)*0.08;
  playerVel.z -= Math.cos(playerAngle)*0.08;
 }
 if(keys['ArrowLeft']) playerAngle += 0.04;
 if(keys['ArrowRight']) playerAngle -= 0.04;
 // Jump
 if(keys[' ']) {
  if(player.position.y <= 1.01) playerYVel = 0.3;
 }
 playerYVel -= 0.02; // gravity
 player.position.y += playerYVel;
 if(player.position.y < 1) { player.position.y=1; playerYVel=0; }

 player.position.x += playerVel.x;
 player.position.z += playerVel.z;
 player.rotation.y = playerAngle;
 playerVel.multiplyScalar(0.85);
}

function updateAI() {
 // Forward/back AI
 const dir = ball.position.clone().sub(ai.position);
 const distance = dir.length();
 dir.normalize();
 aiAngle = Math.atan2(dir.x, dir.z);
 ai.rotation.y = aiAngle;

 if(distance > 3) {
  aiVel.x += dir.x*0.08;
  aiVel.z += dir.z*0.08;
 }
 // Simple AI jump if ball is above AI
 if(ball.position.y - ai.position.y > 2 && ai.position.y <= 1.01) aiYVel = 0.3;
 aiYVel -= 0.02;
 ai.position.y += aiYVel;
 if(ai.position.y < 1) { ai.position.y=1; aiYVel=0; }

 ai.position.add(aiVel);
 aiVel.multiplyScalar(0.85);
}

function updateBall() {
 ball.position.add(ballVel);
 ballVel.multiplyScalar(0.95);

 // collision with player
 const distP = player.position.distanceTo(ball.position);
 if(distP < 5) {
  const dir = ball.position.clone().sub(player.position).normalize();
  ballVel.add(dir.multiplyScalar(0.5)).add(playerVel);
 }
 // collision with AI
 const distAI = ai.position.distanceTo(ball.position);
 if(distAI < 5) {
  const dir = ball.position.clone().sub(ai.position).normalize();
  ballVel.add(dir.multiplyScalar(0.5)).add(aiVel);
 }

 // walls
 if(ball.position.x < -100+2 || ball.position.x > 100-2) ballVel.x*=-1;
 if(ball.position.z < -60+2 || ball.position.z > 60-2) ballVel.z*=-1;

 // goals
 if(ball.position.x < -100 && Math.abs(ball.position.z)<5) { score[1]++; reset(); }
 if(ball.position.x > 100 && Math.abs(ball.position.z)<5) { score[0]++; reset(); }

 // prevent ball from falling below field
 if(ball.position.y < 2) ball.position.y = 2;
}

function updateCamera() {
 camera.position.x = player.position.x - 20*Math.sin(playerAngle);
 camera.position.z = player.position.z - 20*Math.cos(playerAngle);
 camera.position.y = 15;
 camera.lookAt(player.position);
}

function animate() {
 requestAnimationFrame(animate);
 updatePlayer();
 updateAI();
 updateBall();
 updateCamera();
 document.getElementById('ui').innerText = `Score: ${score[0]} - ${score[1]}`;
 renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
