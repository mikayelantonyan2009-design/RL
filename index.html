<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rocket Car Arena</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
#ui {
 position:absolute; top:10px; left:50%; transform:translateX(-50%);
 color:white; font-family:Arial; font-size:20px;
}
</style>
</head>
<body>
<div id="ui">Score: 0 - 0</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = [0,0];

const keys = {};
document.addEventListener('keydown', e => keys[e.key]=true);
document.addEventListener('keyup', e => keys[e.key]=false);

class Car {
 constructor(x,y,color) {
  this.x=x; this.y=y;
  this.vx=0; this.vy=0;
  this.angle=0;
  this.color=color;
 }
 update() {
  if(keys['ArrowUp']) {
   this.vx += Math.cos(this.angle)*0.2;
   this.vy += Math.sin(this.angle)*0.2;
  }
  if(keys['ArrowLeft']) this.angle -= 0.05;
  if(keys['ArrowRight']) this.angle += 0.05;
  if(keys[' ']) { // boost
   this.vx += Math.cos(this.angle)*0.4;
   this.vy += Math.sin(this.angle)*0.4;
  }

  this.x += this.vx;
  this.y += this.vy;

  this.vx *= 0.98;
  this.vy *= 0.98;

  // walls
  if(this.x<0||this.x>canvas.width) this.vx*=-1;
  if(this.y<0||this.y>canvas.height) this.vy*=-1;
 }
 draw() {
  ctx.save();
  ctx.translate(this.x,this.y);
  ctx.rotate(this.angle);
  ctx.fillStyle=this.color;
  ctx.fillRect(-15,-10,30,20);
  ctx.restore();
 }
}

class Ball {
 constructor() {
  this.x=canvas.width/2;
  this.y=canvas.height/2;
  this.vx=0; this.vy=0;
  this.r=15;
 }
 update() {
  this.x+=this.vx;
  this.y+=this.vy;
  this.vx*=0.995;
  this.vy*=0.995;

  // bounce walls
  if(this.x<this.r||this.x>canvas.width-this.r) this.vx*=-1;
  if(this.y<this.r||this.y>canvas.height-this.r) this.vy*=-1;

  // goals
  if(this.x<10) { score[1]++; reset(); }
  if(this.x>canvas.width-10) { score[0]++; reset(); }
 }
 draw() {
  ctx.beginPath();
  ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
  ctx.fillStyle='white';
  ctx.fill();
 }
}

function collide(car, ball) {
 const dx = ball.x - car.x;
 const dy = ball.y - car.y;
 const dist = Math.hypot(dx,dy);
 if(dist < ball.r + 20) {
  ball.vx = dx * 0.1 + car.vx;
  ball.vy = dy * 0.1 + car.vy;
 }
}

const player = new Car(200,canvas.height/2,'cyan');
const ball = new Ball();

function reset() {
 ball.x = canvas.width/2;
 ball.y = canvas.height/2;
 ball.vx = ball.vy = 0;
 player.x = 200;
 player.y = canvas.height/2;
}

function loop() {
 ctx.clearRect(0,0,canvas.width,canvas.height);

 player.update();
 ball.update();
 collide(player, ball);

 player.draw();
 ball.draw();

 document.getElementById('ui').innerText = `Score: ${score[0]} - ${score[1]}`;

 requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
